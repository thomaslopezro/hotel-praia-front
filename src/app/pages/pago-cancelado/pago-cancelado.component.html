<div style="min-height:100vh;background:linear-gradient(180deg,#08121a,#023047);display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:520px;width:100%;background:rgba(15,23,42,0.65);border:1px solid #1e293b;border-radius:18px;padding:48px 36px;text-align:center;">
    <div style="font-size:72px;margin-bottom:12px;">⏸️</div>
    <h1 style="font-family:Georgia,serif;color:#d6b36a;font-size:28px;margin:0 0 12px;">Pago cancelado</h1>
    <p style="color:#cbd5e1;font-size:15px;margin:0 0 28px;line-height:1.6;">
      Cancelaste el pago. No se cobró nada y la reserva NO se creó.
    </p>
    <button (click)="irAlInicio()"
      style="background:linear-gradient(135deg,#d6b36a,#b99243);color:#08121a;border:none;padding:12px 28px;border-radius:999px;font-weight:600;cursor:pointer;">
      Volver al inicio
    </button>
  </div>
</div>
