<div style="min-height:100vh;background:linear-gradient(180deg,#08121a,#023047);display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:520px;width:100%;background:rgba(15,23,42,0.6);border:1px solid #1e293b;border-radius:18px;padding:48px 36px;">

    <a routerLink="/login"
      style="position:absolute;top:20px;left:20px;color:#cbd5e1;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-size:14px;padding:8px 14px;border:1px solid rgba(203,213,225,0.3);border-radius:8px;background:rgba(15,23,42,0.6);">
      ← Volver al login
    </a>

    <div style="text-align:center;margin-bottom:18px;">
      <img src="assets/images/logoPraia.png" alt="Hotel Praia"
        style="width:64px;height:64px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;">
    </div>
    <p style="color:#b89a5e;letter-spacing:0.28em;font-size:11px;text-transform:uppercase;margin:0 0 8px;text-align:center;">HOTEL PRAIA</p>
    <h1 style="font-family:Georgia,serif;color:#d6b36a;font-size:30px;margin:0 0 12px;text-align:center;">Recuperar contraseña</h1>
    <p style="color:#cbd5e1;text-align:center;margin:0 0 28px;line-height:1.6;">
      Ingresa el correo con el que te registraste. Te enviaremos un enlace para elegir una nueva contraseña.
    </p>

    <!-- Form -->
    <div *ngIf="!mensaje">
      <div style="margin-bottom:18px;">
        <label style="display:block;color:#fff;font-size:14px;margin-bottom:8px;">Correo electrónico</label>
        <input
          type="email"
          [(ngModel)]="correo"
          placeholder="tucorreo@ejemplo.com"
          [disabled]="cargando"
          style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:14px;outline:none;"
        />
      </div>

      <p *ngIf="error" style="color:#fda4af;font-size:13px;margin:0 0 16px;text-align:center;">{{ error }}</p>

      <button
        (click)="enviar()"
        [disabled]="cargando"
        style="width:100%;background:linear-gradient(135deg,#d6b36a,#b99243);color:#08121a;border:none;padding:14px;border-radius:999px;font-weight:600;cursor:pointer;font-size:14px;letter-spacing:0.05em;">
        {{ cargando ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </div>

    <!-- Confirmación enviada -->
    <div *ngIf="mensaje" style="text-align:center;">
      <div style="font-size:64px;margin-bottom:12px;">📬</div>
      <p style="color:#a7f3d0;font-size:15px;margin:0 0 24px;line-height:1.6;">{{ mensaje }}</p>
      <p style="color:#94a3b8;font-size:12px;margin:0 0 20px;line-height:1.6;">
        Revisa tu bandeja de entrada (y la carpeta de spam). El enlace expira en 1 hora.
      </p>
      <button (click)="irALogin()"
        style="background:transparent;color:#cbd5e1;border:1px solid #334155;padding:12px 28px;border-radius:999px;cursor:pointer;font-size:13px;">
        Volver al login
      </button>
    </div>

  </div>
</div>
