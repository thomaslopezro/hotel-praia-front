<header class="border-b border-slate-800 bg-slate-950/70 backdrop-blur text-slate-100">
  <div class="mx-auto max-w-3xl px-4 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold">
        {{ editing ? 'Editar servicio' : 'Crear servicio' }}
      </h1>
      <p class="text-sm text-slate-400">Completa los campos y guarda.</p>
    </div>

    <button
      type="button"
      (click)="cancel()"
      class="rounded-lg border border-slate-800 px-4 py-2 text-sm hover:bg-slate-900">
      Volver
    </button>
  </div>
</header>

<main class="mx-auto max-w-3xl px-4 py-8 text-slate-100">
  <div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-6">

    <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">

      <div *ngIf="editing" class="text-xs text-slate-400">
        ID: <span class="font-mono">{{ servicioId }}</span>
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Título</label>
        <input
          type="text"
          formControlName="title"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="Ej: Spa & Bienestar">
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Subtítulo</label>
        <input
          type="text"
          formControlName="subtitle"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="Ej: Rituales de calma">
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Descripción</label>
        <textarea
          formControlName="description"
          rows="3"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="Descripción breve..."></textarea>
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">URL de imagen</label>
        <input
          type="text"
          formControlName="image"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="https://...">
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Features (separados por coma)</label>
        <input
          type="text"
          formControlName="features"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="Masajes, Sauna, Jacuzzi, Aromaterapia">
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Precio (USD)</label>
        <input
          type="number"
          min="0"
          step="1"
          formControlName="precio"
          class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
          placeholder="Ej: 50">
        <p *ngIf="form.get('precio')?.touched && form.get('precio')?.invalid"
           class="text-xs text-rose-400 mt-1">
          Ingresa un precio válido (0 o mayor).
        </p>
      </div>

      <div class="pt-2 flex gap-2">
        <button
          type="submit"
          class="rounded-xl bg-sky-600 px-5 py-2 text-sm font-medium hover:bg-sky-500">
          Guardar
        </button>

        <button
          type="button"
          (click)="cancel()"
          class="rounded-xl border border-slate-800 px-5 py-2 text-sm hover:bg-slate-900">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</main>
