<div style="min-height:100vh;background:linear-gradient(180deg,#08121a,#023047);display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:520px;width:100%;background:rgba(15,23,42,0.6);border:1px solid #1e293b;border-radius:18px;padding:48px 36px;">

    <div style="text-align:center;margin-bottom:18px;">
      <img src="assets/images/logoPraia.png" alt="Hotel Praia"
        style="width:64px;height:64px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;">
    </div>
    <p style="color:#b89a5e;letter-spacing:0.28em;font-size:11px;text-transform:uppercase;margin:0 0 8px;text-align:center;">HOTEL PRAIA</p>
    <h1 style="font-family:Georgia,serif;color:#d6b36a;font-size:30px;margin:0 0 12px;text-align:center;">Nueva contraseña</h1>

    <!-- Form -->
    <div *ngIf="!exito">
      <p style="color:#cbd5e1;text-align:center;margin:0 0 28px;line-height:1.6;">
        Elige una nueva contraseña para tu cuenta.
      </p>

      <div style="margin-bottom:18px;">
        <label style="display:block;color:#fff;font-size:14px;margin-bottom:8px;">Nueva contraseña</label>
        <div style="position:relative;">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            [(ngModel)]="nuevaPassword"
            placeholder="Mínimo 4 caracteres"
            [disabled]="cargando || !token"
            style="width:100%;padding:14px;padding-right:80px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:14px;outline:none;"
          />
          <button type="button"
            (click)="mostrarPassword = !mostrarPassword"
            style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#b89a5e;cursor:pointer;font-size:12px;padding:6px 10px;">
            {{ mostrarPassword ? 'Ocultar' : 'Ver' }}
          </button>
        </div>
      </div>

      <div style="margin-bottom:18px;">
        <label style="display:block;color:#fff;font-size:14px;margin-bottom:8px;">Confirmar contraseña</label>
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="confirmacion"
          placeholder="Repite la nueva contraseña"
          [disabled]="cargando || !token"
          style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:14px;outline:none;"
        />
      </div>

      <p *ngIf="error" style="color:#fda4af;font-size:13px;margin:0 0 16px;text-align:center;">{{ error }}</p>

      <button
        (click)="guardar()"
        [disabled]="cargando || !token"
        style="width:100%;background:linear-gradient(135deg,#d6b36a,#b99243);color:#08121a;border:none;padding:14px;border-radius:999px;font-weight:600;cursor:pointer;font-size:14px;letter-spacing:0.05em;">
        {{ cargando ? 'Guardando...' : 'Guardar nueva contraseña' }}
      </button>
    </div>

    <!-- Éxito -->
    <div *ngIf="exito" style="text-align:center;">
      <div style="font-size:72px;margin-bottom:12px;">✅</div>
      <p style="color:#a7f3d0;font-size:16px;margin:0 0 24px;line-height:1.6;">
        Tu contraseña fue actualizada correctamente.
      </p>
      <button (click)="irALogin()"
        style="background:linear-gradient(135deg,#d6b36a,#b99243);color:#08121a;border:none;padding:14px 32px;border-radius:999px;font-weight:600;cursor:pointer;font-size:14px;letter-spacing:0.05em;">
        Iniciar sesión
      </button>
    </div>

  </div>
</div>
